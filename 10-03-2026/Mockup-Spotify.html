<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify Mockup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <style>
      :root {
        --spotify-green: #1db954;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", sans-serif;
        color: #fff;
        background: radial-gradient(circle at 12% 18%, #7f8a4f 0%, transparent 35%),
          radial-gradient(circle at 50% 50%, #3a3a44 0%, transparent 38%),
          radial-gradient(circle at 88% 30%, #8f2c2f 0%, transparent 35%),
          linear-gradient(140deg, #1b2220 0%, #232831 45%, #22191f 100%);
        display: grid;
        place-items: center;
        padding: 32px 20px;
      }

      .scene {
        width: min(1180px, 100%);
        background: rgba(10, 12, 14, 0.42);
        border: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(7px);
        border-radius: 10px;
        padding: 26px;
      }

      .players {
        display: flex;
        justify-content: center;
        gap: 24px;
        flex-wrap: wrap;
      }

      .player {
        width: 190px;
        border-radius: 8px;
        background: linear-gradient(180deg, #121519 0%, #090b0e 100%);
        padding: 10px 10px 12px;
        box-shadow: 0 18px 30px rgba(0, 0, 0, 0.45);
      }

      .player--green {
        background: linear-gradient(180deg, #2f5841 0%, #0b1110 50%, #080a0d 100%);
      }

      .player--gray {
        background: linear-gradient(180deg, #262830 0%, #11131a 58%, #090a0d 100%);
      }

      .player--red {
        background: linear-gradient(180deg, #7a1b1d 0%, #220d13 58%, #090a0d 100%);
      }

      .top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .top i {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.9);
        margin-top: 4px;
      }

      .context {
        text-align: center;
      }

      .context p {
        margin: 0;
      }

      .context .source {
        font-size: 6px;
        letter-spacing: 0.6px;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.75);
      }

      .context .playlist {
        font-size: 8px;
        margin-top: 2px;
        color: #fff;
      }

      .cover {
        border-radius: 8px;
        height: 190px;
        margin-bottom: 12px;
        overflow: hidden;
        position: relative;
      }

      .cover--classic {
        background: linear-gradient(145deg, #d3d189, #5f7e4e);
      }

      .cover--classic::before {
        content: "";
        position: absolute;
        inset: 8px;
        border-radius: 6px;
        border: 2px solid rgba(242, 246, 173, 0.7);
      }

      .cover--classic::after {
        content: "Lata Mangeshkar";
        position: absolute;
        left: 10px;
        bottom: 10px;
        font-size: 8px;
        font-weight: 600;
        background: rgba(255, 255, 255, 0.75);
        color: #202e1f;
        padding: 3px 6px;
        border-radius: 3px;
      }

      .cover--classic .portrait {
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 40% 30%, rgba(255, 255, 255, 0.18), transparent 35%),
          linear-gradient(180deg, rgba(19, 86, 71, 0.65), rgba(34, 72, 41, 0.65));
        mix-blend-mode: multiply;
      }

      .cover--gray {
        background: linear-gradient(165deg, #f4f4f4 0%, #dbdbdb 100%);
        color: #3a3a3a;
        display: grid;
        place-items: center;
        text-align: center;
      }

      .spotify-dot {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: #70db9a;
        margin: 0 auto 10px;
        position: relative;
      }

      .spotify-dot::before,
      .spotify-dot::after {
        content: "";
        position: absolute;
        left: 16px;
        right: 16px;
        border-top: 5px solid #202020;
        border-radius: 40px;
      }

      .spotify-dot::before {
        top: 25px;
      }

      .spotify-dot::after {
        top: 38px;
      }

      .mockup-title {
        font-size: 16px;
        font-weight: 700;
        line-height: 1.05;
      }

      .mockup-sub {
        font-size: 7px;
        margin-top: 6px;
        letter-spacing: 0.6px;
      }

      .cover--red {
        background: linear-gradient(160deg, #20070a 0%, #8e1618 52%, #d33838 100%);
      }

      .cover--red::before {
        content: "STRONGER";
        position: absolute;
        top: 16px;
        left: 14px;
        font-size: 45px;
        line-height: 0.9;
        letter-spacing: 1px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.7);
      }

      .cover--red::after {
        content: "KANYE WEST • DAFT PUNK";
        position: absolute;
        bottom: 12px;
        left: 12px;
        font-size: 8px;
        letter-spacing: 1px;
      }

      .song {
        margin: 0;
        font-size: 23px;
        line-height: 1.15;
      }

      .song small {
        display: block;
        margin-top: 2px;
        font-size: 7px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.72);
      }

      .progress {
        margin-top: 10px;
      }

      .bar {
        height: 2px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.2);
        overflow: hidden;
      }

      .bar span {
        display: block;
        height: 100%;
        width: 34%;
        background: #fff;
      }

      .time {
        display: flex;
        justify-content: space-between;
        margin-top: 4px;
        font-size: 7px;
        color: rgba(255, 255, 255, 0.7);
      }

      .controls {
        margin-top: 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .controls i {
        font-size: 12px;
      }

      .controls .accent {
        color: var(--spotify-green);
      }

      .play {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: 0;
        display: grid;
        place-items: center;
        background: #fff;
        color: #111;
      }

      .bottom {
        margin-top: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: rgba(255, 255, 255, 0.85);
      }

      .bottom i {
        font-size: 10px;
      }

      @media (max-width: 900px) {
        .scene {
          padding: 20px;
        }

        .players {
          gap: 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="scene">
      <div class="players">
        <article class="player player--green">
          <header class="top">
            <i class="fa-solid fa-chevron-down"></i>
            <div class="context">
              <p class="source">PLAYING FROM YOUR LIBRARY</p>
              <p class="playlist">Yaadien</p>
            </div>
            <i class="fa-solid fa-ellipsis-vertical"></i>
          </header>

          <div class="cover cover--classic">
            <div class="portrait"></div>
          </div>

          <h2 class="song">Lag Jaa Gale <small>Lata Mangeshkar</small></h2>

          <div class="progress">
            <div class="bar"><span></span></div>
            <div class="time"><span>0:00</span><span>03:18</span></div>
          </div>

          <div class="controls">
            <i class="fa-solid fa-shuffle accent"></i>
            <i class="fa-solid fa-backward-step"></i>
            <button class="play" aria-label="Play"><i class="fa-solid fa-play"></i></button>
            <i class="fa-solid fa-forward-step"></i>
            <i class="fa-solid fa-repeat accent"></i>
          </div>

          <footer class="bottom">
            <i class="fa-solid fa-laptop"></i>
            <div>
              <i class="fa-solid fa-share-nodes"></i>
              <i class="fa-solid fa-list" style="margin-left: 12px"></i>
            </div>
          </footer>
        </article>

        <article class="player player--gray">
          <header class="top">
            <i class="fa-solid fa-chevron-down"></i>
            <div class="context">
              <p class="source">PLAYING FROM YOUR LIBRARY</p>
              <p class="playlist">Playlist Name</p>
            </div>
            <i class="fa-solid fa-ellipsis-vertical"></i>
          </header>

          <div class="cover cover--gray">
            <div>
              <div class="spotify-dot"></div>
              <div class="mockup-title">Spotify<br />Mockup</div>
              <div class="mockup-sub">SONGS &amp; PODCAST SCREEN</div>
            </div>
          </div>

          <h2 class="song">Song Name <small>Artist Name</small></h2>

          <div class="progress">
            <div class="bar"><span style="width: 26%"></span></div>
            <div class="time"><span>0:00</span><span>07:18</span></div>
          </div>

          <div class="controls">
            <i class="fa-solid fa-shuffle accent"></i>
            <i class="fa-solid fa-backward-step"></i>
            <button class="play" aria-label="Play"><i class="fa-solid fa-play"></i></button>
            <i class="fa-solid fa-forward-step"></i>
            <i class="fa-solid fa-repeat accent"></i>
          </div>

          <footer class="bottom">
            <i class="fa-solid fa-laptop"></i>
            <div>
              <i class="fa-solid fa-share-nodes"></i>
              <i class="fa-solid fa-list" style="margin-left: 12px"></i>
            </div>
          </footer>
        </article>

        <article class="player player--red">
          <header class="top">
            <i class="fa-solid fa-chevron-down"></i>
            <div class="context">
              <p class="source">PLAYING FROM YOUR LIBRARY</p>
              <p class="playlist">Drug</p>
            </div>
            <i class="fa-solid fa-ellipsis-vertical"></i>
          </header>

          <div class="cover cover--red"></div>

          <h2 class="song">Stronger <small>Kanye West</small></h2>

          <div class="progress">
            <div class="bar"><span style="width: 42%"></span></div>
            <div class="time"><span>0:00</span><span>03:58</span></div>
          </div>

          <div class="controls">
            <i class="fa-solid fa-shuffle accent"></i>
            <i class="fa-solid fa-backward-step"></i>
            <button class="play" aria-label="Play"><i class="fa-solid fa-play"></i></button>
            <i class="fa-solid fa-forward-step"></i>
            <i class="fa-solid fa-repeat accent"></i>
          </div>

          <footer class="bottom">
            <i class="fa-solid fa-laptop"></i>
            <div>
              <i class="fa-solid fa-share-nodes"></i>
              <i class="fa-solid fa-list" style="margin-left: 12px"></i>
            </div>
          </footer>
        </article>
      </div>
    </div>
  </body>
</html>
